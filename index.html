<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Factory v51 | Stable Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/buffer/6.0.3/buffer.min.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@solana/spl-token@0.3.9/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@metaplex-foundation/mpl-token-metadata@2.13.0/dist/browser/index.iife.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #ffffff; padding: 10px; display: flex; justify-content: center; }
        .card { background: #151515; padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid #333; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        h2 { color: #14f195; text-align: center; margin-bottom: 25px; font-size: 24px; letter-spacing: 1px; }
        label { font-size: 11px; color: #9945FF; font-weight: bold; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 10px; border: 1px solid #222; background: #1a1a1a; color: white; box-sizing: border-box; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 15px; text-transform: uppercase; }
        #btnConnect { background: #9945FF; color: white; border: 1px solid #fff; }
        #btnCreate { background: #14f195; color: #000; font-size: 16px; box-shadow: 0 0 15px rgba(20, 241, 149, 0.3); }
        #log { padding: 12px; background: #000; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 11px; color: #00ff00; height: 100px; overflow-y: auto; border: 1px solid #222; margin-top: 10px; }
        #previewContainer { text-align: center; margin-bottom: 15px; display: none; }
        #logoPreview { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #14f195; object-fit: cover; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>SOLANA FACTORY V51</h2>
    <button id="btnConnect">1. HUBUNGKAN WALLET</button>
    
    <label>LOGO TOKEN:</label>
    <div id="previewContainer"><img id="logoPreview" src=""></div>
    <input id="logoFile" type="file" accept="image/*">
    
    <label>NAMA & SIMBOL:</label>
    <input id="name" placeholder="Contoh: Shinryu Dragon">
    <input id="symbol" placeholder="Contoh: SHIN">
    <textarea id="desc" placeholder="Deskripsi token lo..." rows="2"></textarea>
    
    <div class="grid">
        <div><label>SUPPLY:</label><input id="supply" type="number" placeholder="1000000000"></div>
        <div><label>DECIMALS:</label><input id="decimals" type="number" value="9"></div>
    </div>

    <button id="btnCreate">2. LUNCURKAN TOKEN (0.3 SOL)</button>
    <div id="log">Status: Standby...</div>
</div>

<script>
const HELIUS_RPC = "https://mainnet.helius-rpc.com/?api-key=8a3c5a03-6ddb-4ebf-8b28-ee7f2b31f8c1";
const PINATA_JWT = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySW5mb3JtYXRpb24iOnsiaWQiOiI0MThlMGJkOC04MjJiLTQzYTktYmY4ZS0zMTA0ZmRlNDQzMzYiLCJlbWFpbCI6InZhcmlhc2ltb3RvcnRAZ21haWwuY29tIiwiZW1haWxfdmVyaWZpZWQiOnRydWUsInBpbl9wb2xpY3kiOnsicmVnaW9ucyI6W3siZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiRlJBMSJ9LHsiZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiTllDMSJ9XSwidmVyc2lvbiI6MX0sIm1mYV9lbmFibGVkIjpmYWxzZSwic3RhdHVzIjoiQUNUSVZFIn0sImF1dGhlbnRpY2F0aW9uVHlwZSI6InNjb3BlZEtleSIsInNjb3BlZEtleUtleSI6IjhmNzEyZThmMWE2ZDI1MTU4ZDgxIiwic2NvcGVkS2V5U2VjcmV0IjoiODlhNWEwYjBkOTY4MTM5NDVhOWNlODQwYmNhYTUzNDcwOGExOTRiMGIyYjQ4YzU4MGNiMzMxYmYxODc3MDYzNyIsImV4cCI6MTgwNDMyOTk3OX0.A4lFCvpr0AUDZcDhG9bX3o6uMINlkJcNqDmgQWt97wE";
const OWNER_FEE_DEST = "38d92K9xPyTM9Cg4x8fdYcTgzEXiJ5FuwvJbeT6Xu7M8";

window.Buffer = buffer.Buffer;
let userPubKey = null;

function updateLog(msg) {
    const logDiv = document.getElementById('log');
    logDiv.innerHTML += `<br>> ${msg}`;
    logDiv.scrollTop = logDiv.scrollHeight;
}

document.getElementById('logoFile').onchange = function() {
    const file = this.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('logoPreview').src = e.target.result;
            document.getElementById('previewContainer').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
};

document.getElementById('btnConnect').onclick = async () => {
    try {
        const provider = window?.phantom?.solana || window?.solana;
        if (!provider) return alert("Buka lewat Browser di dalam App Phantom!");
        const resp = await provider.connect();
        userPubKey = resp.publicKey;
        document.getElementById('btnConnect').innerText = `WALLET: ${userPubKey.toString().slice(0,6)}...`;
        document.getElementById('btnConnect').style.background = "#14f195";
        document.getElementById('btnConnect').style.color = "#000";
        updateLog("Wallet Terhubung!");
    } catch (err) { alert("Gagal Connect: " + err.message); }
};

async function uploadIPFS(file, name, symbol, desc) {
    const formData = new FormData();
    formData.append('file', file);
    const imgRes = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
        method: 'POST', headers: { Authorization: `Bearer ${PINATA_JWT}` }, body: formData
    });
    const imgData = await imgRes.json();
    const imageUrl = `https://gateway.pinata.cloud/ipfs/${imgData.IpfsHash}`;

    const metaJSON = { 
        name, symbol, description: desc, image: imageUrl, 
        attributes: [], properties: { files: [{ uri: imageUrl, type: "image/png" }] } 
    };
    const jsonRes = await fetch("https://api.pinata.cloud/pinning/pinJSONToIPFS", {
        method: 'POST', headers: { Authorization: `Bearer ${PINATA_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify(metaJSON)
    });
    const jsonData = await jsonRes.json();
    return `https://gateway.pinata.cloud/ipfs/${jsonData.IpfsHash}`;
}

document.getElementById('btnCreate').onclick = async () => {
    const web3 = window.solanaWeb3;
    // FIX: Mapping splToken supaya tidak undefined
    const spl = window.splToken;
    const mpl = window.mplTokenMetadata;

    if (!userPubKey) return alert("Konek Wallet Dulu, Bro!");
    const name = document.getElementById('name').value.trim();
    const symbol = document.getElementById('symbol').value.trim();
    const supplyRaw = document.getElementById('supply').value;
    const logoFile = document.getElementById('logoFile').files[0];

    if (!name || !symbol || !supplyRaw || !logoFile) return alert("Lengkapi data dulu!");

    const btn = document.getElementById('btnCreate');
    btn.disabled = true; btn.innerText = "PROSES...";

    try {
        const connection = new web3.Connection(HELIUS_RPC, "confirmed");
        const decimals = parseInt(document.getElementById('decimals').value) || 9;
        const M_PROG_ID = new web3.PublicKey("metaqbxxUfaypS9e3uJ8teU67cKxSBy79z3G2v4f99T");

        updateLog("Step 1: Upload Metadata ke IPFS...");
        const metaUri = await uploadIPFS(logoFile, name, symbol, document.getElementById('desc').value);

        updateLog("Step 2: Membuat Transaksi...");
        const mintKey = web3.Keypair.generate();
        const tx = new web3.Transaction();

        // A. Create Mint & Initial Mint
        tx.add(
            web3.SystemProgram.transfer({ fromPubkey: userPubKey, toPubkey: new web3.PublicKey(OWNER_FEE_DEST), lamports: 0.3 * web3.LAMPORTS_PER_SOL }),
            web3.SystemProgram.createAccount({
                fromPubkey: userPubKey, newAccountPubkey: mintKey.publicKey,
                space: 82, lamports: await connection.getMinimumBalanceForRentExemption(82),
                programId: spl.TOKEN_PROGRAM_ID
            }),
            spl.createInitializeMintInstruction(mintKey.publicKey, decimals, userPubKey, userPubKey)
        );

        // B. Metaplex Metadata
        const [mPDA] = web3.PublicKey.findProgramAddressSync([Buffer.from("metadata"), M_PROG_ID.toBuffer(), mintKey.publicKey.toBuffer()], M_PROG_ID);
        tx.add(mpl.createCreateMetadataAccountV3Instruction(
            { metadata: mPDA, mint: mintKey.publicKey, mintAuthority: userPubKey, payer: userPubKey, updateAuthority: userPubKey },
            { createMetadataAccountV3Args: {
                data: { name, symbol, uri: metaUri, sellerFeeBasisPoints: 0, creators: null, collection: null, uses: null },
                isMutable: true, collectionDetails: null
            } }
        ));

        // C. ATA & Mint Supply & Revoke
        const ata = await spl.getAssociatedTokenAddress(mintKey.publicKey, userPubKey);
        const amount = BigInt(supplyRaw) * BigInt(Math.pow(10, decimals));
        
        tx.add(
            spl.createAssociatedTokenAccountInstruction(userPubKey, ata, userPubKey, mintKey.publicKey),
            spl.createMintToInstruction(mintKey.publicKey, ata, userPubKey, amount),
            spl.createSetAuthorityInstruction(mintKey.publicKey, userPubKey, spl.AuthorityType.MintTokens, null)
        );

        updateLog("Step 3: Silakan ACC di Wallet...");
        tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;
        tx.feePayer = userPubKey;
        tx.partialSign(mintKey);

        const signed = await (window.phantom?.solana || window.solana).signTransaction(tx);
        const sig = await connection.sendRawTransaction(signed.serialize());
        
        updateLog("Step 4: Menunggu Jaringan...");
        await connection.confirmTransaction(sig);
        
        const ca = mintKey.publicKey.toBase58();
        updateLog(`<b style='color:#14f195'>GOKIL! Token Berhasil Dibuat.</b>`);
        updateLog(`CA: ${ca}`);
        alert("BERHASIL!\nToken: " + name + "\nCA: " + ca);
        window.open(`https://solscan.io/token/${ca}`, '_blank');
    } catch (err) {
        updateLog(`<span style='color:red'>Gagal: ${err.message}</span>`);
        alert("Eror: " + err.message);
    } finally {
        btn.disabled = false; btn.innerText = "LUNCURKAN TOKEN (0.3 SOL)";
    }
};
</script>
</body>
</html>
