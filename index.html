<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOKEN FACTORY V48 | THE GHOST FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/buffer/6.0.3/buffer.min.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@solana/spl-token@0.3.9/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@metaplex-foundation/mpl-token-metadata@2.13.0/dist/browser/index.iife.js"></script>
    
    <style>
        :root { --neon: #14f195; --purple: #9945FF; --dark: #0a0a0a; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: #fff; padding: 15px; display: flex; justify-content: center; }
        .card { background: #121212; padding: 25px; border-radius: 24px; width: 100%; max-width: 450px; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        h2 { color: var(--neon); text-align: center; font-size: 22px; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 2px; }
        label { font-size: 11px; color: var(--purple); font-weight: 700; display: block; margin-bottom: 6px; text-transform: uppercase; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--neon); outline: none; }
        button { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-bottom: 15px; transition: 0.3s; text-transform: uppercase; }
        #btnConnect { background: var(--purple); color: white; border: 2px solid transparent; }
        #btnConnect.connected { background: var(--neon); color: #000; border-color: #fff; }
        #btnCreate { background: var(--neon); color: #000; font-size: 16px; margin-top: 10px; }
        #btnCreate:disabled { background: #222; color: #555; cursor: not-allowed; }
        #log { padding: 15px; background: #000; border-radius: 12px; font-family: 'Monaco', monospace; font-size: 10px; color: var(--neon); height: 100px; overflow-y: auto; border: 1px solid #222; line-height: 1.5; }
        .badge { background: rgba(20, 241, 149, 0.1); border: 1px solid var(--neon); padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 11px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>FACTORY V48 PRO</h2>
    <button id="btnConnect">HUBUNGKAN PHANTOM</button>
    
    <label>Logo Token (Image)</label>
    <input id="logoFile" type="file" accept="image/*">
    
    <label>Identitas Token</label>
    <input id="name" placeholder="Nama Token">
    <input id="symbol" placeholder="Simbol Token">
    <textarea id="desc" placeholder="Deskripsi Proyek..." rows="2"></textarea>
    
    <label>Media Sosial</label>
    <input id="website" placeholder="Website URL">
    <input id="twitter" placeholder="Twitter URL">
    <input id="telegram" placeholder="Telegram URL">

    <label>Ekonomi Token</label>
    <div style="display: flex; gap: 10px;">
        <input id="supply" type="number" placeholder="Total Supply">
        <input id="decimals" type="number" value="9" style="width: 85px;">
    </div>

    <div class="badge">
        <b>REVOKE MINT & FREEZE</b><br>
        Fee: 0.3 SOL | Metadata: IPFS Pinata
    </div>

    <button id="btnCreate">LUNCURKAN SEKARANG</button>
    <div id="log">Status: Menunggu Wallet...</div>
</div>

<script>
// CONFIG
const HELIUS_RPC = "https://mainnet.helius-rpc.com/?api-key=8a3c5a03-6ddb-4ebf-8b28-ee7f2b31f8c1";
const PINATA_JWT = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySW5mb3JtYXRpb24iOnsiaWQiOiI0MThlMGJkOC04MjJiLTQzYTktYmY4ZS0zMTA0ZmRlNDQzMzYiLCJlbWFpbCI6InZhcmlhc2ltb3RvcnRAZ21haWwuY29tIiwiZW1haWxfdmVyaWZpZWQiOnRydWUsInBpbl9wb2xpY3kiOnsicmVnaW9ucyI6W3siZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiRlJBMSJ9LHsiZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiTllDMSJ9XSwidmVyc2lvbiI6MX0sIm1mYV9lbmFibGVkIjpmYWxzZSwic3RhdHVzIjoiQUNUSVZFIn0sImF1dGhlbnRpY2F0aW9uVHlwZSI6InNjb3BlZEtleSIsInNjb3BlZEtleUtleSI6IjhmNzEyZThmMWE2ZDI1MTU4ZDgxIiwic2NvcGVkS2V5U2VjcmV0IjoiODlhNWEwYjBkOTY4MTM5NDVhOWNlODQwYmNhYTUzNDcwOGExOTRiMGIyYjQ4YzU4MGNiMzMxYmYxODc3MDYzNyIsImV4cCI6MTgwNDMyOTk3OX0.A4lFCvpr0AUDZcDhG9bX3o6uMINlkJcNqDmgQWt97wE";
const OWNER_FEE_DEST = "38d92K9xPyTM9Cg4x8fdYcTgzEXiJ5FuwvJbeT6Xu7M8";

// Global Init
window.Buffer = window.buffer.Buffer;
let userPubKey = null;

function updateLog(msg) {
    const logDiv = document.getElementById('log');
    logDiv.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${msg}`;
    logDiv.scrollTop = logDiv.scrollHeight;
}

// FORCE CONNECT LOGIC
async function connectWallet() {
    try {
        // Multi-Path Detection
        const provider = window.phantom?.solana || window.solana || (window.ethereum?.isPhantom ? window.ethereum : null);
        
        if (!provider) {
            updateLog("Wallet tidak terdeteksi! Mengalihkan ke Phantom...");
            setTimeout(() => {
                window.location.href = `https://phantom.app/ul/browse/${encodeURIComponent(window.location.href)}`;
            }, 1000);
            return;
        }

        updateLog("Menghubungkan...");
        const resp = await provider.connect();
        userPubKey = resp.publicKey;
        
        const btn = document.getElementById('btnConnect');
        btn.innerText = "CONNECTED: " + userPubKey.toString().slice(0,6);
        btn.classList.add('connected');
        updateLog("Sukses: " + userPubKey.toString());
    } catch (e) {
        updateLog("Gagal: " + e.message);
        console.error(e);
    }
}

document.getElementById('btnConnect').addEventListener('click', connectWallet);

// Pinata Upload
async function uploadIPFS(file, name, symbol, desc, web, tw, tg) {
    const formData = new FormData();
    formData.append('file', file);
    const imgRes = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
        method: 'POST', headers: { Authorization: `Bearer ${PINATA_JWT}` }, body: formData
    });
    const imgData = await imgRes.json();
    const imageUrl = `https://gateway.pinata.cloud/ipfs/${imgData.IpfsHash}`;

    const metaJSON = { 
        name, symbol, description: desc, image: imageUrl, external_url: web, 
        extensions: { website: web, twitter: tw, telegram: tg } 
    };
    const jsonRes = await fetch("https://api.pinata.cloud/pinning/pinJSONToIPFS", {
        method: 'POST', headers: { Authorization: `Bearer ${PINATA_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify(metaJSON)
    });
    const jsonData = await jsonRes.json();
    return `https://gateway.pinata.cloud/ipfs/${jsonData.IpfsHash}`;
}

// Transaction Logic
document.getElementById('btnCreate').onclick = async () => {
    if (!userPubKey) return alert("Konek Wallet Dulu!");
    const btn = document.getElementById('btnCreate');
    btn.disabled = true;
    btn.innerText = "SEDANG MENCIPTAKAN...";

    try {
        const web3 = window.solanaWeb3;
        const spl = window.splToken;
        const mpl = window.mplTokenMetadata;
        const connection = new web3.Connection(HELIUS_RPC, "confirmed");

        updateLog("Mungunggah Metadata...");
        const metaUri = await uploadIPFS(
            document.getElementById('logoFile').files[0],
            document.getElementById('name').value,
            document.getElementById('symbol').value,
            document.getElementById('desc').value,
            document.getElementById('website').value,
            document.getElementById('twitter').value,
            document.getElementById('telegram').value
        );

        updateLog("Menyusun Kontrak...");
        const mintKey = web3.Keypair.generate();
        const tx = new web3.Transaction();
        const decimals = parseInt(document.getElementById('decimals').value) || 9;
        const supply = BigInt(document.getElementById('supply').value) * (BigInt(10) ** BigInt(decimals));

        tx.add(
            web3.SystemProgram.transfer({ fromPubkey: userPubKey, toPubkey: new web3.PublicKey(OWNER_FEE_DEST), lamports: 0.3 * web3.LAMPORTS_PER_SOL }),
            web3.SystemProgram.createAccount({
                fromPubkey: userPubKey, newAccountPubkey: mintKey.publicKey,
                space: 82, lamports: await connection.getMinimumBalanceForRentExemption(82),
                programId: spl.TOKEN_PROGRAM_ID
            }),
            spl.createInitializeMintInstruction(mintKey.publicKey, decimals, userPubKey, userPubKey)
        );

        const mID = new web3.PublicKey("metaqbxxUfaypS9e3uJ8teU67cKxSBy79z3G2v4f99T");
        const [mPDA] = web3.PublicKey.findProgramAddressSync([Buffer.from("metadata"), mID.toBuffer(), mintKey.publicKey.toBuffer()], mID);

        tx.add(mpl.createCreateMetadataAccountV3Instruction(
            { metadata: mPDA, mint: mintKey.publicKey, mintAuthority: userPubKey, payer: userPubKey, updateAuthority: userPubKey },
            { createMetadataAccountV3Args: {
                data: { name: document.getElementById('name').value, symbol: document.getElementById('symbol').value, uri: metaUri, sellerFeeBasisPoints: 0, creators: null, collection: null, uses: null },
                isMutable: false, collectionDetails: null
            } }
        ));

        const ata = await spl.getAssociatedTokenAddress(mintKey.publicKey, userPubKey);
        tx.add(
            spl.createAssociatedTokenAccountInstruction(userPubKey, ata, userPubKey, mintKey.publicKey),
            spl.createMintToInstruction(mintKey.publicKey, ata, userPubKey, supply),
            spl.createSetAuthorityInstruction(mintKey.publicKey, userPubKey, spl.AuthorityType.MintTokens, null),
            spl.createSetAuthorityInstruction(mintKey.publicKey, userPubKey, spl.AuthorityType.FreezeAccount, null)
        );

        updateLog("Menunggu Konfirmasi...");
        tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;
        tx.feePayer = userPubKey;
        tx.partialSign(mintKey);

        const provider = window.phantom?.solana || window.solana;
        const signed = await provider.signTransaction(tx);
        const sig = await connection.sendRawTransaction(signed.serialize());
        
        await connection.confirmTransaction(sig);
        updateLog("TOKEN SUKSES: " + mintKey.publicKey.toBase58());
        alert("Token Berhasil Meluncur!");
    } catch (e) {
        updateLog("EROR: " + e.message);
        alert(e.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "LUNCURKAN SEKARANG";
    }
};
</script>
</body>
</html>
