<!DOCTYPE html>

    <title>Solana Token Factory | Instant Mint</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        :root { --green: #14f195; --purple: #9945ff; --bg: #0b0b0b; --card: #121212; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--green); box-shadow: 0 0 20px rgba(20, 241, 149, 0.1); }
        h2 { text-align: center; color: var(--green); margin-bottom: 5px; }
        .fee-tag { text-align: center; color: var(--green); background: rgba(20,241,149,0.1); padding: 8px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; border: 1px solid var(--green); }
        
        label { display: block; font-size: 12px; color: #888; margin-top: 15px; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .auth-section { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-top: 20px; border: 1px solid #333; }
        .check-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
        .check-item input { width: auto; margin: 0; }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-connect { background: var(--purple); color: white; margin-bottom: 15px; }
        .btn-create { background: var(--green); color: black; }
        
        /* Pop-up CA Sukses */
        #successBox { display: none; background: #000; border: 2px solid var(--green); padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .ca-value { background: #222; padding: 12px; border-radius: 8px; word-break: break-all; color: var(--green); font-family: monospace; margin: 10px 0; border: 1px solid #444; }

        .ref-section { margin-top: 30px; padding-top: 20px; border-top: 1px dashed #444; }
        .ref-link { background: #000; padding: 10px; border-radius: 8px; font-size: 11px; color: var(--green); margin-top: 10px; border: 1px solid #333; word-break: break-all; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Solana Factory</h2>
    <div class="fee-tag">Total Fee: 0.30 SOL</div>

    <button id="btnConnect" class="btn btn-connect">Connect Phantom Wallet</button>

    <div id="tokenForm">
        <div class="grid-2">
            <div><label>Token Name</label><input type="text" id="name" placeholder="E.g. Bitcoin 2.0"></div>
            <div><label>Ticker</label><input type="text" id="symbol" placeholder="BTC2"></div>
        </div>

        <label>Description</label>
        <textarea id="desc" rows="2" placeholder="Describe your token..."></textarea>

        <label>Logo (Upload dari Galeri - 12. Muncul di Blockchain)</label>
        <input type="file" id="logo" accept="image/*" style="border: 1px dashed var(--green);">

        <div class="grid-2">
            <div><label>Total Supply</label><input type="number" id="supply" value="1000000000"></div>
            <div><label>Decimals</label><input type="number" id="decimals" value="9"></div>
        </div>

        <div class="grid-2">
            <div><label>Twitter (X)</label><input type="text" id="twitter" placeholder="Link Twitter"></div>
            <div><label>Telegram</label><input type="text" id="tg" placeholder="Link Telegram"></div>
        </div>

        <div class="auth-section">
            <label style="color:var(--green); margin-top:0;">Authority Settings</label>
            <div class="check-item"><input type="checkbox" id="revM" checked> Revoke Mint (Fixed Supply)</div>
            <div class="check-item"><input type="checkbox" id="revF" checked> Revoke Freeze (LP Safe)</div>
            <div class="check-item"><input type="checkbox" id="revMeta" checked> Revoke Metadata (Immutable)</div>
        </div>

        <button id="btnCreate" class="btn btn-create">CREATE TOKEN NOW</button>
    </div>

    <div id="successBox">
        <h3 style="margin:0; color:var(--green);">🚀 MINTING SUCCESS!</h3>
        <p style="font-size:12px;">Token & Logo resmi terdaftar.</p>
        <div class="ca-value" id="caResult">CA_ADDRESS</div>
        <button onclick="copyCA()" style="background:var(--green); border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">Copy CA</button>
    </div>

    <div class="ref-section">
        <label style="color: var(--purple); font-weight: bold;">🤝 Referral Program</label>
        <p style="font-size: 11px; color: #888; margin: 5px 0;">Dapat 0.005 SOL setiap transaksi referral!</p>
        <input type="text" id="refWallet" placeholder="Masukkan Wallet SOL lo">
        <button onclick="genRef()" style="background:#333; color:white; border:none; padding:10px; width:100%; border-radius:10px; margin-top:8px; cursor:pointer;">Generate My Link</button>
        <div id="refLinkDisplay" class="ref-link"></div>
    </div>
</div>

        btn.innerText = "⏳ Sedang Memproses (IPFS & Mint)...";

        alert("CA Berhasil di Copy!");

    // 11. Referral Link
    function genRef() {
        const wallet = document.getElementById('refWallet').value;
        if(wallet.length < 32) return alert("Alamat wallet tidak valid!");
        const link = window.location.origin + window.location.pathname + "?ref=" + wallet;
        const display = document.getElementById('refLinkDisplay');
        display.innerText = link;
        display.style.display = "block";
    }

</html>
