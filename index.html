<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Solana Factory Pro | Metadata V3 & Modern SPL</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@solana/spl-token@0.4.0/lib/index.iife.min.js"></script>
    <script src="https://bundle.run/buffer@6.0.3"></script>
    <script src="https://unpkg.com/@metaplex-foundation/mpl-token-metadata@2.13.0/dist/index.iife.min.js"></script>
    <style>
        :root { --green: #14f195; --purple: #9945ff; }
        body { font-family: sans-serif; background: #0b0b0b; color: white; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: #121212; padding: 25px; border-radius: 20px; border: 1px solid var(--green); }
        input, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; }
        .btn-create { background: var(--green); color: black; margin-top: 10px; }
        #status { font-size: 11px; color: #888; margin-top: 10px; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--green)">Solana Factory v10</h2>
    
    <button id="btnConnect" class="btn" style="background:var(--purple); color:white; margin-bottom:15px;">Connect Phantom</button>

    <div id="formArea">
        <input type="text" id="name" placeholder="Token Name">
        <input type="text" id="symbol" placeholder="Symbol">
        <textarea id="desc" placeholder="Metadata JSON URI (e.g. https://ipfs.io/ipfs/...)"></textarea>
        
        <div style="display:flex; gap:10px">
            <input type="number" id="supply" value="1000000000">
            <input type="number" id="decimals" value="9">
        </div>

        <button id="btnCreate" class="btn btn-create">DEPLOY REAL TOKEN</button>
        <div id="status">Status: Wallet Not Connected</div>
    </div>
</div>

<script>
    window.Buffer = buffer.Buffer;
    const METADATA_PROGRAM_ID = new solanaWeb3.PublicKey("metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s");
    const OWNER_FEE_DEST = "38d92K9xPyTM9Cg4x8fdYcTgzEXiJ5FuwvJbeT6Xu7M8";

    let userPubKey = null;
    const setStatus = (m) => { document.getElementById('status').innerText = `Status: ${m}`; };

    document.getElementById('btnConnect').onclick = async () => {
        const resp = await window.solana.connect();
        userPubKey = resp.publicKey;
        setStatus("Wallet Connected");
    };

    document.getElementById('btnCreate').onclick = async () => {
        if (!userPubKey) return alert("Connect Wallet!");
        const btn = document.getElementById('btnCreate');
        btn.disabled = true;

        try {
            const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com", "confirmed");
            const mintKeypair = solanaWeb3.Keypair.generate();
            const decimals = parseInt(document.getElementById('decimals').value);
            const supply = BigInt(document.getElementById('supply').value) * BigInt(10 ** decimals);

            setStatus("Building Atomic Transaction...");
            const transaction = new solanaWeb3.Transaction();

            // 1. Fee Transfer (0.30 SOL)
            transaction.add(solanaWeb3.SystemProgram.transfer({
                fromPubkey: userPubKey,
                toPubkey: new solanaWeb3.PublicKey(OWNER_FEE_DEST),
                lamports: 0.3 * solanaWeb3.LAMPORTS_PER_SOL
            }));

            // 2. Create Mint Account
            const lamports = await splToken.getMinimumBalanceForRentExemptMint(connection);
            transaction.add(
                solanaWeb3.SystemProgram.createAccount({
                    fromPubkey: userPubKey,
                    newAccountPubkey: mintKeypair.publicKey,
                    space: splToken.MINT_SIZE,
                    lamports,
                    programId: splToken.TOKEN_PROGRAM_ID,
                }),
                splToken.createInitializeMintInstruction(mintKeypair.publicKey, decimals, userPubKey, userPubKey)
            );

            // 3. Create Associated Token Account (ATA)
            const ata = await splToken.getAssociatedTokenAddress(mintKeypair.publicKey, userPubKey);
            transaction.add(
                splToken.createAssociatedTokenAccountInstruction(userPubKey, ata, userPubKey, mintKeypair.publicKey)
            );

            // 4. Mint Supply to Wallet
            transaction.add(
                splToken.createMintToInstruction(mintKeypair.publicKey, ata, userPubKey, supply)
            );

            // --- 5. METADATA V3 INSTRUCTION (Poin 2 - REAL) ---
            const [metadataPDA] = solanaWeb3.PublicKey.findProgramAddressSync(
                [Buffer.from("metadata"), METADATA_PROGRAM_ID.toBuffer(), mintKeypair.publicKey.toBuffer()],
                METADATA_PROGRAM_ID
            );

            const metadataData = {
                name: document.getElementById('name').value,
                symbol: document.getElementById('symbol').value,
                uri: document.getElementById('desc').value, // Link IPFS JSON
                sellerFeeBasisPoints: 0,
                creators: null,
                collection: null,
                uses: null
            };

            const createMetadataIx = mplTokenMetadata.createCreateMetadataAccountV3Instruction(
                {
                    metadata: metadataPDA,
                    mint: mintKeypair.publicKey,
                    mintAuthority: userPubKey,
                    payer: userPubKey,
                    updateAuthority: userPubKey,
                },
                {
                    createMetadataAccountV3Args: {
                        data: metadataData,
                        isMutable: true,
                        collectionDetails: null
                    }
                }
            );
            transaction.add(createMetadataIx);

            setStatus("Waiting for Phantom Approval...");
            const { signature } = await window.solana.signAndSendTransaction(transaction, [mintKeypair]);
            
            setStatus("Confirming on Blockchain...");
            await connection.confirmTransaction(signature);
            
            alert(`SUCCESS! Token CA: ${mintKeypair.publicKey.toBase58()}`);
            setStatus("Deployment Complete!");

        } catch (err) {
            console.error(err);
            setStatus(`Error: ${err.message}`);
        } finally {
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
