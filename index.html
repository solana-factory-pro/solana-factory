<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dardcor SPL Token Factory - Solana</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome CDN for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            @apply bg-gray-900 text-gray-100;
        }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            @apply bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-300;
        }
        .btn-secondary {
            @apply bg-gray-700 hover:bg-gray-600 text-gray-200 font-bold py-2 px-4 rounded transition duration-300;
        }
        input[type="text"], input[type="number"] {
            @apply bg-gray-800 border border-gray-700 text-white p-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500;
        }
        .message {
            @apply p-3 mt-4 rounded-md text-sm;
        }
        .message.success {
            @apply bg-green-800 text-green-200;
        }
        .message.error {
            @apply bg-red-800 text-red-200;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #ffffff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4">

    <header class="w-full max-w-4xl flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-blue-500">Dardcor SPL Token Factory</h1>
        <div id="wallet-container" class="flex items-center space-x-4">
            <span id="wallet-address" class="text-gray-400 text-sm hidden md:block">Belum Terhubung</span>
            <button id="connect-wallet-btn" class="btn-primary">
                <i class="fas fa-wallet mr-2"></i>Hubungkan Wallet
            </button>
            <button id="disconnect-wallet-btn" class="btn-secondary hidden">
                <i class="fas fa-power-off mr-2"></i>Putuskan
            </button>
        </div>
    </header>

    <main class="w-full max-w-4xl flex flex-col lg:flex-row gap-8">
        <!-- Token Creation Section -->
        <section class="glassmorphism p-6 flex-1">
            <h2 class="text-2xl font-semibold mb-6 text-blue-400">Buat Token SPL Baru</h2>
            <form id="create-token-form" class="space-y-4">
                <div>
                    <label for="token-name" class="block text-gray-300 text-sm font-bold mb-2">Nama Token:</label>
                    <input type="text" id="token-name" placeholder="Dardcor Token" class="w-full" required>
                </div>
                <div>
                    <label for="token-symbol" class="block text-gray-300 text-sm font-bold mb-2">Simbol Token:</label>
                    <input type="text" id="token-symbol" placeholder="DRDC" class="w-full" required>
                </div>
                <div>
                    <label for="token-decimals" class="block text-gray-300 text-sm font-bold mb-2">Desimal (Presisi):</label>
                    <input type="number" id="token-decimals" value="9" min="0" max="9" class="w-full" required>
                </div>
                <div>
                    <label for="initial-supply" class="block text-gray-300 text-sm font-bold mb-2">Suplai Awal:</label>
                    <input type="number" id="initial-supply" value="1000000" min="1" class="w-full" required>
                </div>
                <button type="submit" id="create-token-btn" class="btn-primary w-full flex items-center justify-center">
                    <span id="create-token-btn-text">Buat Token</span>
                    <div id="create-token-spinner" class="spinner ml-2 hidden"></div>
                </button>
                <div id="create-token-message" class="message hidden"></div>
            </form>
        </section>

        <!-- Token Information & Management Section -->
        <section class="glassmorphism p-6 flex-1">
            <h2 class="text-2xl font-semibold mb-6 text-blue-400">Informasi & Kelola Token</h2>
            <div id="token-info" class="space-y-4">
                <div>
                    <p class="text-gray-300 text-sm font-bold">Mint Address:</p>
                    <a id="mint-address-display" class="text-blue-300 hover:underline break-all" target="_blank" rel="noopener noreferrer">Belum ada token dibuat</a>
                </div>
                <div>
                    <p class="text-gray-300 text-sm font-bold">Total Suplai:</p>
                    <p id="total-supply-display" class="text-lg font-semibold">0</p>
                </div>
                <div>
                    <p class="text-gray-300 text-sm font-bold">Tautan Transaksi Terakhir:</p>
                    <a id="transaction-link-display" class="text-blue-300 hover:underline break-all" target="_blank" rel="noopener noreferrer">Tidak ada</a>
                </div>
            </div>

            <hr class="border-gray-700 my-8">

            <!-- Mint More Tokens -->
            <h3 class="text-xl font-semibold mb-4 text-blue-300">Cetak Lebih Banyak Token</h3>
            <form id="mint-more-form" class="space-y-4">
                <div>
                    <label for="mint-amount" class="block text-gray-300 text-sm font-bold mb-2">Jumlah Cetak:</label>
                    <input type="number" id="mint-amount" min="1" class="w-full" required>
                </div>
                <button type="submit" id="mint-more-btn" class="btn-secondary w-full flex items-center justify-center" disabled>
                    <span id="mint-more-btn-text">Cetak Token</span>
                    <div id="mint-more-spinner" class="spinner ml-2 hidden"></div>
                </button>
                <div id="mint-more-message" class="message hidden"></div>
            </form>

            <hr class="border-gray-700 my-8">

            <!-- Transfer Tokens -->
            <h3 class="text-xl font-semibold mb-4 text-blue-300">Transfer Token</h3>
            <form id="transfer-form" class="space-y-4">
                <div>
                    <label for="transfer-recipient" class="block text-gray-300 text-sm font-bold mb-2">Penerima (Public Key):</label>
                    <input type="text" id="transfer-recipient" placeholder="Recipient's Public Key" class="w-full" required>
                </div>
                <div>
                    <label for="transfer-amount" class="block text-gray-300 text-sm font-bold mb-2">Jumlah Transfer:</label>
                    <input type="number" id="transfer-amount" min="1" class="w-full" required>
                </div>
                <button type="submit" id="transfer-btn" class="btn-secondary w-full" disabled>Transfer Token</button>
                <div id="transfer-message" class="message hidden"></div>
            </form>

            <hr class="border-gray-700 my-8">

            <!-- Burn Tokens -->
            <h3 class="text-xl font-semibold mb-4 text-blue-300">Bakar Token</h3>
            <form id="burn-form" class="space-y-4">
                <div>
                    <label for="burn-amount" class="block text-gray-300 text-sm font-bold mb-2">Jumlah Bakar:</label>
                    <input type="number" id="burn-amount" min="1" class="w-full" required>
                </div>
                <button type="submit" id="burn-btn" class="btn-secondary w-full" disabled>Bakar Token</button>
                <div id="burn-message" class="message hidden"></div>
            </form>
        </section>
    </main>

    <footer class="mt-8 text-gray-500 text-sm">
        Dardcor SPL Token Factory &copy; 2024
    </footer>

    <!-- JavaScript untuk interaksi Solana -->
    <script type="module">
        import { Connection, PublicKey, Keypair, SystemProgram, Transaction, sendAndConfirmTransaction } from 'https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js';
        import { getOrCreateAssociatedTokenAccount, createInitializeMintInstruction, createMintToInstruction, createTransferInstruction, createBurnInstruction, MINT_SIZE, TOKEN_PROGRAM_ID, ASSOCIATED_TOKEN_PROGRAM_ID } from 'https://unpkg.com/@solana/spl-token@latest/lib/index.iife.min.js';

        // Konfigurasi Solana
        const SOLANA_NETWORK = 'devnet'; // Anda bisa ganti ke 'mainnet-beta' untuk transaksi nyata
        const connection = new Connection(`https://api.${SOLANA_NETWORK}.solana.com`, 'confirmed');

        // Elemen UI
        const connectWalletBtn = document.getElementById('connect-wallet-btn');
        const disconnectWalletBtn = document.getElementById('disconnect-wallet-btn');
        const walletAddressSpan = document.getElementById('wallet-address');
        const createTokenForm = document.getElementById('create-token-form');
        const createTokenBtn = document.getElementById('create-token-btn');
        const createTokenBtnText = document.getElementById('create-token-btn-text');
        const createTokenSpinner = document.getElementById('create-token-spinner');
        const createTokenMessage = document.getElementById('create-token-message');
        const mintAddressDisplay = document.getElementById('mint-address-display');
        const totalSupplyDisplay = document.getElementById('total-supply-display');
        const transactionLinkDisplay = document.getElementById('transaction-link-display');
        const mintMoreForm = document.getElementById('mint-more-form');
        const mintMoreBtn = document.getElementById('mint-more-btn');
        const mintMoreBtnText = document.getElementById('mint-more-btn-text');
        const mintMoreSpinner = document.getElementById('mint-more-spinner');
        const mintMoreMessage = document.getElementById('mint-more-message');
        const transferForm = document.getElementById('transfer-form');
        const transferBtn = document.getElementById('transfer-btn');
        const transferMessage = document.getElementById('transfer-message');
        const burnForm = document.getElementById('burn-form');
        const burnBtn = document.getElementById('burn-btn');
        const burnMessage = document.getElementById('burn-message');

        let walletProvider = null;
        let payerPublicKey = null;
        let currentMint = null; // Public Key of the created token mint

        // Fungsi untuk mengupdate UI wallet
        function updateWalletUI() {
            if (payerPublicKey) {
                walletAddressSpan.textContent = `Wallet: ${payerPublicKey.toBase58().substring(0, 6)}...${payerPublicKey.toBase58().slice(-6)}`;
                walletAddressSpan.classList.remove('hidden');
                connectWalletBtn.classList.add('hidden');
                disconnectWalletBtn.classList.remove('hidden');
                createTokenBtn.disabled = false;
                mintMoreBtn.disabled = !currentMint;
                transferBtn.disabled = !currentMint;
                burnBtn.disabled = !currentMint;
            } else {
                walletAddressSpan.textContent = 'Belum Terhubung';
                walletAddressSpan.classList.add('hidden');
                connectWalletBtn.classList.remove('hidden');
                disconnectWalletBtn.classList.add('hidden');
                createTokenBtn.disabled = true;
                mintMoreBtn.disabled = true;
                transferBtn.disabled = true;
                burnBtn.disabled = true;
            }
        }

        // Fungsi untuk menghubungkan wallet (Phantom)
        async function connectWallet() {
            try {
                if (window.solana && window.solana.isPhantom) {
                    walletProvider = window.solana;
                    const resp = await walletProvider.connect();
                    payerPublicKey = new PublicKey(resp.publicKey.toString());
                    console.log('Wallet terhubung:', payerPublicKey.toBase58());
                    updateWalletUI();
                } else {
                    alert('Phantom Wallet tidak ditemukan. Silakan instal Phantom.');
                    window.open('https://phantom.app/', '_blank');
                }
            } catch (err) {
                console.error('Gagal menghubungkan wallet:', err);
                alert('Gagal menghubungkan wallet. Pastikan Anda telah menyetujui koneksi.');
            }
        }

        // Fungsi untuk memutuskan wallet
        async function disconnectWallet() {
            try {
                if (walletProvider) {
                    await walletProvider.disconnect();
                    payerPublicKey = null;
                    currentMint = null;
                    console.log('Wallet terputus.');
                    updateWalletUI();
                    // Reset token info
                    mintAddressDisplay.textContent = 'Belum ada token dibuat';
                    mintAddressDisplay.href = '#';
                    totalSupplyDisplay.textContent = '0';
                    transactionLinkDisplay.textContent = 'Tidak ada';
                    transactionLinkDisplay.href = '#';
                }
            } catch (err) {
                console.error('Gagal memutuskan wallet:', err);
            }
        }

        // Fungsi untuk menampilkan pesan
        function showMessage(element, message, type = 'info') {
            element.textContent = message;
            element.className = `message ${type}`;
            element.classList.remove('hidden');
            setTimeout(() => {
                element.classList.add('hidden');
            }, 5000);
        }

        // Fungsi untuk membuat token SPL
        createTokenForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!payerPublicKey) {
                showMessage(createTokenMessage, 'Harap hubungkan wallet terlebih dahulu.', 'error');
                return;
            }

            createTokenBtn.disabled = true;
            createTokenBtnText.classList.add('hidden');
            createTokenSpinner.classList.remove('hidden');
            createTokenMessage.classList.add('hidden');

            const tokenName = document.getElementById('token-name').value;
            const tokenSymbol = document.getElementById('token-symbol').value;
            const tokenDecimals = parseInt(document.getElementById('token-decimals').value);
            const initialSupply = parseFloat(document.getElementById('initial-supply').value);

            try {
                // Generate new keypair for the mint authority
                const mintAuthority = payerPublicKey; // Payer will also be the mint authority
                const freezeAuthority = payerPublicKey; // Payer will also be the freeze authority

                // Generate a new keypair for the mint account
                const mintKeypair = Keypair.generate();

                // Calculate the minimum balance for the mint account
                const requiredBalance = await connection.getMinimumBalanceForRentExemption(MINT_SIZE);

                // Create the transaction
                const transaction = new Transaction().add(
                    SystemProgram.createAccount({
                        fromPubkey: payerPublicKey,
                        newAccountPubkey: mintKeypair.publicKey,
                        space: MINT_SIZE,
                        lamports: requiredBalance,
                        programId: TOKEN_PROGRAM_ID,
                    }),
                    createInitializeMintInstruction(
                        mintKeypair.publicKey,
                        tokenDecimals,
                        mintAuthority,
                        freezeAuthority,
                        TOKEN_PROGRAM_ID
                    )
                );

                // Sign and send the transaction
                const signature = await sendAndConfirmTransaction(
                    connection,
                    transaction,
                    [payerPublicKey, mintKeypair], // Payer signs, mint keypair signs for new account
                    { commitment: 'confirmed', preflightCommitment: 'confirmed' }
                );

                console.log('Token Mint Address:', mintKeypair.publicKey.toBase58());
                console.log('Transaction Signature:', signature);

                // Create an Associated Token Account for the payer
                const associatedTokenAccount = await getOrCreateAssociatedTokenAccount(
                    connection,
                    payerPublicKey, // Payer of the transaction
                    mintKeypair.publicKey, // Mint address
                    payerPublicKey, // Owner of the ATA
                    true, // Allow owner to create ATA if not exists
                    'confirmed',
                    {},
                    TOKEN_PROGRAM_ID,
                    ASSOCIATED_TOKEN_PROGRAM_ID
                );
                console.log('Associated Token Account:', associatedTokenAccount.address.toBase58());

                // Mint initial supply to the associated token account
                const mintToInstruction = createMintToInstruction(
                    mintKeypair.publicKey, // Mint
                    associatedTokenAccount.address, // Destination (ATA of owner)
                    mintAuthority, // Mint authority (payer)
                    initialSupply * (10 ** tokenDecimals), // Amount with decimals
                    [], // Signers
                    TOKEN_PROGRAM_ID
                );

                const mintToTx = new Transaction().add(mintToInstruction);
                const mintToSignature = await sendAndConfirmTransaction(
                    connection,
                    mintToTx,
                    [payerPublicKey], // Payer (mint authority) signs
                    { commitment: 'confirmed', preflightCommitment: 'confirmed' }
                );

                console.log('Initial supply minted. Signature:', mintToSignature);

                currentMint = mintKeypair.publicKey;
                mintAddressDisplay.textContent = currentMint.toBase58();
                mintAddressDisplay.href = `https://solana.fm/address/${currentMint.toBase58()}?cluster=${SOLANA_NETWORK}`;
                totalSupplyDisplay.textContent = initialSupply.toLocaleString();
                transactionLinkDisplay.textContent = signature.substring(0, 10) + '...';
                transactionLinkDisplay.href = `https://solana.fm/tx/${signature}?cluster=${SOLANA_NETWORK}`;

                showMessage(createTokenMessage, `Token ${tokenSymbol} berhasil dibuat! Mint Address: ${currentMint.toBase58()}`, 'success');
                updateWalletUI(); // Enable management buttons
            } catch (error) {
                console.error('Gagal membuat token:', error);
                showMessage(createTokenMessage, `Gagal membuat token: ${error.message || error}`, 'error');
            } finally {
                createTokenBtn.disabled = false;
                createTokenBtnText.classList.remove('hidden');
                createTokenSpinner.classList.add('hidden');
            }
        });

        // Fungsi untuk mencetak lebih banyak token
        mintMoreForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!payerPublicKey || !currentMint) {
                showMessage(mintMoreMessage, 'Harap hubungkan wallet dan buat token terlebih dahulu.', 'error');
                return;
            }

            mintMoreBtn.disabled = true;
            mintMoreBtnText.classList.add('hidden');
            mintMoreSpinner.classList.remove('hidden');
            mintMoreMessage.classList.add('hidden');

            const mintAmount = parseFloat(document.getElementById('mint-amount').value);

            try {
                const mintInfo = await connection.getAccountInfo(currentMint);
                const mintData = Buffer.from(mintInfo.data);
                const decimals = mintData[44]; // Decimals is at byte 44 in Mint account data

                const associatedTokenAccount = await getOrCreateAssociatedTokenAccount(
                    connection,
                    payerPublicKey,
                    currentMint,
                    payerPublicKey,
                    true,
                    'confirmed',
                    {},
                    TOKEN_PROGRAM_ID,
                    ASSOCIATED_TOKEN_PROGRAM_ID
                );

                const mintToInstruction = createMintToInstruction(
                    currentMint,
                    associatedTokenAccount.address,
                    payerPublicKey, // Mint authority (payer)
                    mintAmount * (10 ** decimals),
                    [],
                    TOKEN_PROGRAM_ID
                );

                const transaction = new Transaction().add(mintToInstruction);
                const signature = await sendAndConfirmTransaction(
                    connection,
                    transaction,
                    [payerPublicKey],
                    { commitment: 'confirmed', preflightCommitment: 'confirmed' }
                );

                console.log('Minted more tokens. Signature:', signature);
                showMessage(mintMoreMessage, `${mintAmount} token berhasil dicetak!`, 'success');
                transactionLinkDisplay.textContent = signature.substring(0, 10) + '...';
                transactionLinkDisplay.href = `https://solana.fm/tx/${signature}?cluster=${SOLANA_NETWORK}`;

                // Update total supply display (requires fetching current supply)
                const tokenAccountInfo = await connection.getTokenAccountBalance(associatedTokenAccount.address);
                totalSupplyDisplay.textContent = parseFloat(tokenAccountInfo.value.uiAmountString).toLocaleString();

            } catch (error) {
                console.error('Gagal mencetak token:', error);
                showMessage(mintMoreMessage, `Gagal mencetak token: ${error.message || error}`, 'error');
            } finally {
                mintMoreBtn.disabled = false;
                mintMoreBtnText.classList.remove('hidden');
                mintMoreSpinner.classList.add('hidden');
            }
        });

        // Fungsi untuk transfer token
        transferForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!payerPublicKey || !currentMint) {
                showMessage(transferMessage, 'Harap hubungkan wallet dan buat token terlebih dahulu.', 'error');
                return;
            }

            transferBtn.disabled = true;
            transferMessage.classList.add('hidden');

            const recipientAddress = document.getElementById('transfer-recipient').value;
            const transferAmount = parseFloat(document.getElementById('transfer-amount').value);

            try {
                const recipientPublicKey = new PublicKey(recipientAddress);
                const mintInfo = await connection.getAccountInfo(currentMint);
                const mintData = Buffer.from(mintInfo.data);
                const decimals = mintData[44];

                const fromAssociatedTokenAccount = await getOrCreateAssociatedTokenAccount(
                    connection,
                    payerPublicKey,
                    currentMint,
                    payerPublicKey,
                    true,
                    'confirmed',
                    {},
                    TOKEN_PROGRAM_ID,
                    ASSOCIATED_TOKEN_PROGRAM_ID
                );

                const toAssociatedTokenAccount = await getOrCreateAssociatedTokenAccount(
                    connection,
                    payerPublicKey, // Payer for creating ATA if not exists
                    currentMint,
                    recipientPublicKey,
                    true,
                    'confirmed',
                    {},
                    TOKEN_PROGRAM_ID,
                    ASSOCIATED_TOKEN_PROGRAM_ID
                );

                const transferInstruction = createTransferInstruction(
                    fromAssociatedTokenAccount.address,
                    toAssociatedTokenAccount.address,
                    payerPublicKey, // Owner of the source ATA
                    transferAmount * (10 ** decimals),
                    [],
                    TOKEN_PROGRAM_ID
                );

                const transaction = new Transaction().add(transferInstruction);
                const signature = await sendAndConfirmTransaction(
                    connection,
                    transaction,
                    [payerPublicKey],
                    { commitment: 'confirmed', preflightCommitment: 'confirmed' }
                );

                console.log('Token transferred. Signature:', signature);
                showMessage(transferMessage, `${transferAmount} token berhasil ditransfer ke ${recipientAddress}!`, 'success');
                transactionLinkDisplay.textContent = signature.substring(0, 10) + '...';
                transactionLinkDisplay.href = `https://solana.fm/tx/${signature}?cluster=${SOLANA_NETWORK}`;

                // Update total supply display (requires fetching current supply)
                const tokenAccountInfo = await connection.getTokenAccountBalance(fromAssociatedTokenAccount.address);
                totalSupplyDisplay.textContent = parseFloat(tokenAccountInfo.value.uiAmountString).toLocaleString();

            } catch (error) {
                console.error('Gagal transfer token:', error);
                showMessage(transferMessage, `Gagal transfer token: ${error.message || error}`, 'error');
            } finally {
                transferBtn.disabled = false;
            }
        });

        // Fungsi untuk membakar token
        burnForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!payerPublicKey || !currentMint) {
                showMessage(burnMessage, 'Harap hubungkan wallet dan buat token terlebih dahulu.', 'error');
                return;
            }

            burnBtn.disabled = true;
            burnMessage.classList.add('hidden');

            const burnAmount = parseFloat(document.getElementById('burn-amount').value);

            try {
                const mintInfo = await connection.getAccountInfo(currentMint);
                const mintData = Buffer.from(mintInfo.data);
                const decimals = mintData[44];

                const associatedTokenAccount = await getOrCreateAssociatedTokenAccount(
                    connection,
                    payerPublicKey,
                    currentMint,
                    payerPublicKey,
                    false, // Do not create if not exists, user must have token
                    'confirmed',
                    {},
                    TOKEN_PROGRAM_ID,
                    ASSOCIATED_TOKEN_PROGRAM_ID
                );

                const burnInstruction = createBurnInstruction(
                    associatedTokenAccount.address,
                    currentMint,
                    payerPublicKey, // Owner of the ATA
                    burnAmount * (10 ** decimals),
                    [],
                    TOKEN_PROGRAM_ID
                );

                const transaction = new Transaction().add(burnInstruction);
                const signature = await sendAndConfirmTransaction(
                    connection,
                    transaction,
                    [payerPublicKey],
                    { commitment: 'confirmed', preflightCommitment: 'confirmed' }
                );

                console.log('Token burned. Signature:', signature);
                showMessage(burnMessage, `${burnAmount} token berhasil dibakar!`, 'success');
                transactionLinkDisplay.textContent = signature.substring(0, 10) + '...';
                transactionLinkDisplay.href = `https://solana.fm/tx/${signature}?cluster=${SOLANA_NETWORK}`;

                // Update total supply display (requires fetching current supply)
                const tokenAccountInfo = await connection.getTokenAccountBalance(associatedTokenAccount.address);
                totalSupplyDisplay.textContent = parseFloat(tokenAccountInfo.value.uiAmountString).toLocaleString();

            } catch (error) {
                console.error('Gagal membakar token:', error);
                showMessage(burnMessage, `Gagal membakar token: ${error.message || error}`, 'error');
            } finally {
                burnBtn.disabled = false;
            }
        });

        // Event Listeners
        connectWalletBtn.addEventListener('click', connectWallet);
        disconnectWalletBtn.addEventListener('click', disconnectWallet);

        // Inisialisasi UI saat halaman dimuat
        document.addEventListener('DOMContentLoaded', () => {
            updateWalletUI();
        });

        // Pantau perubahan wallet (jika ada)
        if (window.solana) {
            window.solana.on('connect', (publicKey) => {
                payerPublicKey = new PublicKey(publicKey.toString());
                updateWalletUI();
                console.log('Wallet terhubung otomatis:', payerPublicKey.toBase58());
            });
            window.solana.on('disconnect', () => {
                payerPublicKey = null;
                currentMint = null;
                updateWalletUI();
                console.log('Wallet terputus otomatis.');
            });
        }
    </script>
</body>
</html>
