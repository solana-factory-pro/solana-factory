// --- WALLET LOGIC ---
document.getElementById('btnConnect').onclick = async () => {
    try {
        if (!window.solana) return alert("Please install Phantom Wallet!");
        const resp = await window.solana.connect();
        userPubKey = resp.publicKey;
        document.getElementById('btnConnect').innerText = `CONNECTED: ${userPubKey.toString().slice(0,6)}...`;
        document.getElementById('btnConnect').style.background = "#14f195";
        updateLog("Wallet connected successfully.");
    } catch (err) { alert(err.message); }
};

// --- IPFS LOGIC ---
async function uploadIPFS(file, name, symbol, desc, website, twitter, telegram) {
    const formData = new FormData();
    formData.append('file', file);
    
    const imgRes = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
        method: 'POST', 
        headers: { Authorization: `Bearer ${PINATA_JWT}` }, 
        body: formData
    });
    const imgData = await imgRes.json();
    if (!imgData.IpfsHash) throw new Error("Logo upload to IPFS failed.");
    const imageUrl = `https://gateway.pinata.cloud/ipfs/${imgData.IpfsHash}`;

    const metaJSON = { 
        name, symbol, description: desc || "", image: imageUrl,
        external_url: website || "",
        extensions: { website, twitter, telegram }
    };

    const jsonRes = await fetch("https://api.pinata.cloud/pinning/pinJSONToIPFS", {
        method: 'POST', 
        headers: { Authorization: `Bearer ${PINATA_JWT}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(metaJSON)
    });
    const jsonData = await jsonRes.json();
    return `https://gateway.pinata.cloud/ipfs/${jsonData.IpfsHash}`;
}
