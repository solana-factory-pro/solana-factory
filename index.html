<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Creator Fixed</title>

    <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@solana/spl-token@0.3.9/lib/index.iife.min.js"></script>
    <script src="https://bundle.run/buffer@6.0.3"></script>

    <style>
        :root{--green:#14f195;--purple:#9945ff;--bg:#0b0b0b;}
        body{font-family:'Segoe UI', sans-serif;background:var(--bg);color:white;padding:15px;display:flex;justify-content:center;margin:0;}
        .container{max-width:420px;width:100%;background:#121212;padding:20px;border-radius:14px;border:1px solid #333;box-sizing: border-box;}
        h2{text-align:center;color:var(--green);margin-top:0;}
        input,textarea{width:100%;padding:12px;background:#1a1a1a;border:1px solid #333;color:white;border-radius:8px;margin-bottom:10px;box-sizing: border-box;font-size:14px;}
        .btn{width:100%;padding:14px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:15px;transition: 0.2s;}
        #btnConnect{background:var(--purple);color:white;margin-bottom:15px;}
        #btnCreate{background:var(--green);color:black;margin-top:10px;}
        #btnCreate:disabled{background:#444;color:#888;cursor:not-allowed;}
        #log{background:black;color:#14f195;font-size:11px;padding:12px;border-radius:8px;height:120px;overflow:auto;margin-top:15px;border:1px solid #222;font-family:monospace;}
    </style>
</head>

<body>

<div class="container">
    <h2>Solana Token Creator</h2>
    
    <button id="btnConnect" class="btn">CONNECT PHANTOM</button>

    <input id="name" placeholder="Token Name (contoh: Shinryu)">
    <input id="symbol" placeholder="Symbol (contoh: SHIN)">
    <textarea id="desc" placeholder="Token Description" rows="2"></textarea>

    <label style="font-size: 12px; color: #888;">Logo Token:</label>
    <input type="file" id="logoFile" accept="image/*">

    <div style="display:flex; gap:10px;">
        <input type="number" id="supply" value="1000000000" title="Total Supply">
        <input type="number" id="decimals" value="9" title="Decimals">
    </div>

    <button id="btnCreate" class="btn">CREATE TOKEN (0.3 SOL)</button>

    <div id="log">Status: Menunggu wallet...</div>
</div>

<script>
    window.Buffer = buffer.Buffer;
    const solanaWeb3 = window.solanaWeb3;
    const splToken = window.splToken;

    // KONFIGURASI API (SUDAH TERISI)
    const RPC = "https://mainnet.helius-rpc.com/?api-key=8a3c5a03-6ddb-4ebf-8b28-ee7f2b31f8c1";
    const OWNER = "38d92K9xPyTM9Cg4x8fdYcTgzEXiJ5FuwvJbeT6Xu7M8";
    const PINATA = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySW5mb3JtYXRpb24iOnsiaWQiOiI0MThlMGJkOC04MjJiLTQzYTktYmY4ZS0zMTA0ZmRlNDQzMzYiLCJlbWFpbCI6InZhcmlhc2ltb3RvcnRAZ21haWwuY29tIiwiZW1haWxfdmVyaWZpZWQiOnRydWUsInBpbl9wb2xpY3kiOnsicmVnaW9ucyI6W3siZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiRlJBMSJ9LHsiZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiTllDMSJ9XSwidmVyc2lvbiI6MX0sIm1mYV9lbmFibGVkIjpmYWxzZSwic3RhdHVzIjoiQUNUSVZFIn0sImF1dGhlbnRpY2F0aW9uVHlwZSI6InNjb3BlZEtleSIsInNjb3BlZEtleUtleSI6IjhmNzEyZThmMWE2ZDI1MTU4ZDgxIiwic2NvcGVkS2V5U2VjcmV0IjoiODlhNWEwYjBkOTY4MTM5NDVhOWNlODQwYmNhYTUzNDcwOGExOTRiMGIyYjQ4YzU4MGNiMzMxYmYxODc3MDYzNyIsImV4cCI6MTgwNDMyOTk3OX0.A4lFCvpr0AUDZcDhG9bX3o6uMINlkJcNqDmgQWt97wE";

    let wallet = null;

    function log(t) {
        const el = document.getElementById("log");
        el.innerHTML += "<br>> " + t;
        el.scrollTop = el.scrollHeight;
    }

    document.getElementById("btnConnect").onclick = async () => {
        try {
            if (!window.solana?.isPhantom) {
                alert("Gunakan Browser di dalam App Phantom Wallet!");
                return;
            }
            const resp = await window.solana.connect();
            wallet = resp.publicKey;
            document.getElementById("btnConnect").innerText = "CONNECTED: " + wallet.toBase58().slice(0, 6) + "...";
            document.getElementById("btnConnect").style.background = "#14f195";
            document.getElementById("btnConnect").style.color = "black";
            log("Wallet terhubung: " + wallet.toBase58());
        } catch (err) {
            log("Gagal konek wallet.");
        }
    };

    async function uploadIPFS(file, name, symbol, desc) {
        log("Mengunggah gambar ke IPFS...");
        const fd = new FormData();
        fd.append("file", file);

        const r = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
            method: "POST",
            headers: { Authorization: `Bearer ${PINATA}` },
            body: fd
        });
        const img = await r.json();
        const imageUrl = `https://gateway.pinata.cloud/ipfs/${img.IpfsHash}`;

        log("Mengunggah metadata JSON...");
        const meta = {
            name,
            symbol,
            description: desc,
            image: imageUrl,
            properties: { files: [{ uri: imageUrl, type: file.type }] }
        };

        const r2 = await fetch("https://api.pinata.cloud/pinning/pinJSONToIPFS", {
            method: "POST",
            headers: {
                Authorization: `Bearer ${PINATA}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(meta)
        });
        const js = await r2.json();
        return `https://gateway.pinata.cloud/ipfs/${js.IpfsHash}`;
    }

    document.getElementById("btnCreate").onclick = async () => {
        const btn = document.getElementById("btnCreate");
        try {
            if (!wallet) throw "Connect wallet dulu!";
            const file = document.getElementById("logoFile").files[0];
            if (!file) throw "Logo belum dipilih!";
            
            const name = document.getElementById("name").value;
            const symbol = document.getElementById("symbol").value;
            if (!name || !symbol) throw "Nama/Symbol kosong!";

            btn.disabled = true;
            btn.innerText = "SEDANG PROSES...";

            const connection = new solanaWeb3.Connection(RPC, "confirmed");

            // Cek saldo awal (biaya 0.3 + rent/gas +- 0.05)
            const bal = await connection.getBalance(wallet);
            if (bal < 0.33 * solanaWeb3.LAMPORTS_PER_SOL) throw "Saldo SOL tidak cukup (Butuh min 0.33 SOL)";

            const metadataUri = await uploadIPFS(file, name, symbol, document.getElementById("desc").value);
            log("Metadata siap: " + metadataUri.slice(0, 30) + "...");

            log("Menyusun Transaksi...");
            const mint = solanaWeb3.Keypair.generate();
            const tx = new solanaWeb3.Transaction();

            // 1. Kirim Service Fee
            tx.add(solanaWeb3.SystemProgram.transfer({
                fromPubkey: wallet,
                toPubkey: new solanaWeb3.PublicKey(OWNER),
                lamports: 0.3 * solanaWeb3.LAMPORTS_PER_SOL
            }));

            // 2. Buat Akun Mint Token
            const rent = await connection.getMinimumBalanceForRentExemption(82);
            tx.add(solanaWeb3.SystemProgram.createAccount({
                fromPubkey: wallet,
                newAccountPubkey: mint.publicKey,
                space: 82,
                lamports: rent,
                programId: splToken.TOKEN_PROGRAM_ID
            }));

            const decimals = parseInt(document.getElementById("decimals").value);
            const supply = document.getElementById("supply").value;

            // 3. Inisialisasi Mint
            tx.add(splToken.createInitializeMintInstruction(mint.publicKey, decimals, wallet, wallet));

            // 4. Buat ATA (Associated Token Account)
            const ata = await splToken.getAssociatedTokenAddress(mint.publicKey, wallet);
            tx.add(splToken.createAssociatedTokenAccountInstruction(wallet, ata, wallet, mint.publicKey));

            // 5. Cetak (Mint) Token ke Wallet User
            const amount = BigInt(supply) * (10n ** BigInt(decimals));
            tx.add(splToken.createMintToInstruction(mint.publicKey, ata, wallet, amount));

            // 6. Ambil Blockhash Terakhir
            const block = await connection.getLatestBlockhash();
            tx.recentBlockhash = block.blockhash;
            tx.feePayer = wallet;

            log("Silakan Approve di Phantom...");
            tx.partialSign(mint);

            const signed = await window.solana.signTransaction(tx);
            const sig = await connection.sendRawTransaction(signed.serialize());

            log("Menunggu Konfirmasi Blockchain...");
            await connection.confirmTransaction(sig);

            log("--- SUKSES BESAR! ---");
            log("CA: " + mint.publicKey.toBase58());

            alert("TOKEN BERHASIL DIBUAT!\n\nCA:\n" + mint.publicKey.toBase58());

        } catch (e) {
            log("ERROR: " + e);
            alert("Terjadi kesalahan: " + e);
        } finally {
            btn.disabled = false;
            btn.innerText = "CREATE TOKEN (0.3 SOL)";
        }
    };
</script>

</body>
</html>
