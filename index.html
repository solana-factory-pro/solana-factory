<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOKEN FACTORY V46 | ULTRA FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/buffer/6.0.3/buffer.min.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@solana/spl-token@0.3.9/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@metaplex-foundation/mpl-token-metadata@2.13.0/dist/browser/index.iife.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #ffffff; padding: 10px; display: flex; justify-content: center; }
        .card { background: #151515; padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #14f195; text-align: center; margin-bottom: 20px; font-weight: 800; text-transform: uppercase; }
        label { font-size: 10px; color: #9945FF; font-weight: bold; display: block; margin-bottom: 5px; letter-spacing: 1px; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1e1e1e; color: white; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: all 0.2s ease; }
        #btnConnect { background: #9945FF; color: white; border: 1px solid rgba(255,255,255,0.2); }
        #btnConnect.connected { background: #14f195; color: #000; }
        #btnCreate { background: #14f195; color: #000; font-size: 16px; box-shadow: 0 4px 14px rgba(20, 241, 149, 0.3); }
        #btnCreate:disabled { background: #333; color: #777; box-shadow: none; cursor: not-allowed; }
        #log { padding: 15px; background: #000; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 11px; color: #00ff00; height: 130px; overflow-y: auto; border: 1px solid #222; }
        .security-badge { background: rgba(153, 69, 255, 0.1); border: 1px solid #9945FF; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 11px; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>FACTORY V46 PRO</h2>
    <button id="btnConnect">HUBUNGKAN PHANTOM</button>
    
    <label>TOKEN LOGO</label>
    <input id="logoFile" type="file" accept="image/*">
    
    <label>TOKEN IDENTITY</label>
    <input id="name" placeholder="Nama Token (Contoh: SolMoon)">
    <input id="symbol" placeholder="Simbol (Contoh: SMOON)">
    <textarea id="desc" placeholder="Ceritakan tentang koin lo..." rows="2"></textarea>
    
    <label>SOCIAL LINKS</label>
    <input id="website" placeholder="Website URL">
    <input id="twitter" placeholder="Twitter / X URL">
    <input id="telegram" placeholder="Telegram Group URL">

    <label>SUPPLY & DECIMALS</label>
    <div style="display: flex; gap: 10px;">
        <input id="supply" type="number" placeholder="Total Supply (1.000.000.000)">
        <input id="decimals" type="number" value="9" style="width: 80px;">
    </div>

    <div class="security-badge">
        <b style="color: #14f195;">🛡️ PROTECTED BY V46</b><br>
        Revoke Mint Authority & Freeze Authority Aktif.<br>
        <span style="color: #fff;">Launch Fee: 0.3 SOL</span>
    </div>

    <button id="btnCreate">LAUNCH TOKEN</button>
    <div id="log">Status: Menunggu Wallet terdeteksi...</div>
</div>

<script>
// INITIAL SETTINGS
const HELIUS_RPC = "https://mainnet.helius-rpc.com/?api-key=8a3c5a03-6ddb-4ebf-8b28-ee7f2b31f8c1";
const PINATA_JWT = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySW5mb3JtYXRpb24iOnsiaWQiOiI0MThlMGJkOC04MjJiLTQzYTktYmY4ZS0zMTA0ZmRlNDQzMzYiLCJlbWFpbCI6InZhcmlhc2ltb3RvcnRAZ21haWwuY29tIiwiZW1haWxfdmVyaWZpZWQiOnRydWUsInBpbl9wb2xpY3kiOnsicmVnaW9ucyI6W3siZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiRlJBMSJ9LHsiZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiTllDMSJ9XSwidmVyc2lvbiI6MX0sIm1mYV9lbmFibGVkIjpmYWxzZSwic3RhdHVzIjoiQUNUSVZFIn0sImF1dGhlbnRpY2F0aW9uVHlwZSI6InNjb3BlZEtleSIsInNjb3BlZEtleUtleSI6IjhmNzEyZThmMWE2ZDI1MTU4ZDgxIiwic2NvcGVkS2V5U2VjcmV0IjoiODlhNWEwYjBkOTY4MTM5NDVhOWNlODQwYmNhYTUzNDcwOGExOTRiMGIyYjQ4YzU4MGNiMzMxYmYxODc3MDYzNyIsImV4cCI6MTgwNDMyOTk3OX0.A4lFCvpr0AUDZcDhG9bX3o6uMINlkJcNqDmgQWt97wE";
const OWNER_FEE_DEST = "38d92K9xPyTM9Cg4x8fdYcTgzEXiJ5FuwvJbeT6Xu7M8";

window.Buffer = buffer.Buffer;
let userPubKey = null;
let solanaProvider = null;

function updateLog(msg) {
    const logDiv = document.getElementById('log');
    logDiv.innerHTML += `<br>→ ${msg}`;
    logDiv.scrollTop = logDiv.scrollHeight;
}

// FIX: Auto Detect Wallet with Interval
const detectWallet = setInterval(() => {
    const provider = window.phantom?.solana || window.solana;
    if (provider) {
        solanaProvider = provider;
        updateLog("Wallet Terdeteksi. Silakan Connect.");
        clearInterval(detectWallet);
    }
}, 500);

document.getElementById('btnConnect').onclick = async () => {
    try {
        if (!solanaProvider) {
            updateLog("Membuka Phantom App...");
            window.location.href = "https://phantom.app/ul/browse/" + window.location.href;
            return;
        }

        const resp = await solanaProvider.connect();
        userPubKey = resp.publicKey;
        
        const btn = document.getElementById('btnConnect');
        btn.innerText = "WALLET CONNECTED";
        btn.classList.add('connected');
        updateLog("Terhubung: " + userPubKey.toString().slice(0,8) + "...");
    } catch (err) {
        alert("Gagal konek: " + err.message);
    }
};

async function uploadIPFS(file, name, symbol, desc, web, tw, tg) {
    const formData = new FormData();
    formData.append('file', file);
    
    const imgRes = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
        method: 'POST', headers: { Authorization: `Bearer ${PINATA_JWT}` }, body: formData
    });
    const imgData = await imgRes.json();
    const imageUrl = `https://gateway.pinata.cloud/ipfs/${imgData.IpfsHash}`;

    const metaJSON = { 
        name, symbol, description: desc, image: imageUrl, external_url: web, 
        extensions: { website: web, twitter: tw, telegram: tg } 
    };
    
    const jsonRes = await fetch("https://api.pinata.cloud/pinning/pinJSONToIPFS", {
        method: 'POST', headers: { Authorization: `Bearer ${PINATA_JWT}`, 'Content-Type': 'application/json' }, body: JSON.stringify(metaJSON)
    });
    const jsonData = await jsonRes.json();
    return `https://gateway.pinata.cloud/ipfs/${jsonData.IpfsHash}`;
}

document.getElementById('btnCreate').onclick = async () => {
    const web3 = window.solanaWeb3;
    const spl = window.splToken; 
    const mpl = window.mplTokenMetadata;

    if (!userPubKey) return alert("Konek Wallet Dulu!");
    
    const btn = document.getElementById('btnCreate');
    const name = document.getElementById('name').value;
    const symbol = document.getElementById('symbol').value;
    const supplyRaw = document.getElementById('supply').value;
    const logo = document.getElementById('logoFile').files[0];

    if (!name || !symbol || !supplyRaw || !logo) return alert("Data koin belum lengkap!");

    btn.disabled = true;
    btn.innerText = "PROCESSING...";

    try {
        const connection = new web3.Connection(HELIUS_RPC, "confirmed");
        const decimals = parseInt(document.getElementById('decimals').value) || 9;

        updateLog("1. Uploading Metadata ke IPFS...");
        const metaUri = await uploadIPFS(logo, name, symbol, document.getElementById('desc').value, document.getElementById('website').value, document.getElementById('twitter').value, document.getElementById('telegram').value);

        updateLog("2. Membangun Instruksi Mint...");
        const mintKey = web3.Keypair.generate();
        const transaction = new web3.Transaction();
        const METADATA_PROGRAM_ID = new web3.PublicKey("metaqbxxUfaypS9e3uJ8teU67cKxSBy79z3G2v4f99T");

        // Fee & Account Setup
        transaction.add(
            web3.SystemProgram.transfer({ fromPubkey: userPubKey, toPubkey: new web3.PublicKey(OWNER_FEE_DEST), lamports: 0.3 * web3.LAMPORTS_PER_SOL }),
            web3.SystemProgram.createAccount({
                fromPubkey: userPubKey,
                newAccountPubkey: mintKey.publicKey,
                space: 82,
                lamports: await connection.getMinimumBalanceForRentExemption(82),
                programId: spl.TOKEN_PROGRAM_ID
            }),
            spl.createInitializeMintInstruction(mintKey.publicKey, decimals, userPubKey, userPubKey)
        );

        // Metadata Account
        const [metadataPDA] = web3.PublicKey.findProgramAddressSync(
            [Buffer.from("metadata"), METADATA_PROGRAM_ID.toBuffer(), mintKey.publicKey.toBuffer()],
            METADATA_PROGRAM_ID
        );

        transaction.add(mpl.createCreateMetadataAccountV3Instruction(
            { metadata: metadataPDA, mint: mintKey.publicKey, mintAuthority: userPubKey, payer: userPubKey, updateAuthority: userPubKey },
            { createMetadataAccountV3Args: {
                data: { name, symbol, uri: metaUri, sellerFeeBasisPoints: 0, creators: null, collection: null, uses: null },
                isMutable: false, collectionDetails: null
            } }
        ));

        // ATA & Supply & Revoke
        const ata = await spl.getAssociatedTokenAddress(mintKey.publicKey, userPubKey);
        transaction.add(
            spl.createAssociatedTokenAccountInstruction(userPubKey, ata, userPubKey, mintKey.publicKey),
            spl.createMintToInstruction(mintKey.publicKey, ata, userPubKey, BigInt(supplyRaw) * (BigInt(10) ** BigInt(decimals))),
            spl.createSetAuthorityInstruction(mintKey.publicKey, userPubKey, spl.AuthorityType.MintTokens, null),
            spl.createSetAuthorityInstruction(mintKey.publicKey, userPubKey, spl.AuthorityType.FreezeAccount, null)
        );

        updateLog("3. Menunggu Approval Wallet...");
        const { blockhash } = await connection.getLatestBlockhash();
        transaction.recentBlockhash = blockhash;
        transaction.feePayer = userPubKey;
        transaction.partialSign(mintKey);
        
        const signed = await solanaProvider.signTransaction(transaction);
        const signature = await connection.sendRawTransaction(signed.serialize());
        
        updateLog("4. Menunggu Konfirmasi Jaringan...");
        await connection.confirmTransaction(signature);
        
        updateLog(`BERHASIL! CA: ${mintKey.publicKey.toBase58()}`);
        alert("Token Sukses Launch!\nCA: " + mintKey.publicKey.toBase58());
        window.open(`https://solscan.io/token/${mintKey.publicKey.toBase58()}`, '_blank');

    } catch (err) {
        updateLog("Gagal: " + err.message);
        alert("Gagal: " + err.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "LAUNCH TOKEN";
    }
};
</script>
</body>
</html>
